name: CI and Deploy

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Deployment target"
        required: true
        type: choice
        options:
          - staging
          - production

jobs:
  quality:
    name: Typecheck and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run lint

      - name: Build
        run: npm run build

  deploy_staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: quality
    environment: staging
    if: |
      (
        (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_target == 'staging')
      ) &&
      secrets.STAGING_HOST != '' &&
      secrets.STAGING_USER != '' &&
      secrets.STAGING_SSH_KEY != '' &&
      vars.STAGING_APP_DIR != '' &&
      vars.STAGING_BRANCH != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to staging server over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            if [ ! -d "${{ vars.STAGING_APP_DIR }}" ]; then
              echo "STAGING_APP_DIR does not exist"
              exit 1
            fi
            cd "${{ vars.STAGING_APP_DIR }}"
            git fetch --all --prune
            git checkout "${{ vars.STAGING_BRANCH }}"
            git pull origin "${{ vars.STAGING_BRANCH }}"
            docker compose down
            docker compose up -d --build
            docker image prune -f

  deploy_production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: quality
    environment: production
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.deploy_target == 'production' &&
      secrets.PRODUCTION_HOST != '' &&
      secrets.PRODUCTION_USER != '' &&
      secrets.PRODUCTION_SSH_KEY != '' &&
      vars.PRODUCTION_APP_DIR != '' &&
      vars.PRODUCTION_BRANCH != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to production server over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            if [ ! -d "${{ vars.PRODUCTION_APP_DIR }}" ]; then
              echo "PRODUCTION_APP_DIR does not exist"
              exit 1
            fi
            cd "${{ vars.PRODUCTION_APP_DIR }}"
            git fetch --all --prune
            git checkout "${{ vars.PRODUCTION_BRANCH }}"
            git pull origin "${{ vars.PRODUCTION_BRANCH }}"
            docker compose down
            docker compose up -d --build
            docker image prune -f
